{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg"><a href="{{ base_path }}/">{{ site.title }}</a></li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
              {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
    <button type="button" class="theme-toggle" aria-label="Switch to dark mode" title="Switch to dark mode" aria-pressed="false">
      <span class="theme-toggle__face theme-toggle__dark">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        <span class="theme-toggle__txt">Dark</span>
      </span>
      <span class="theme-toggle__face theme-toggle__light">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0-15a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0V3a1 1 0 0 1 1-1zm0 18a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0v-1a1 1 0 0 1 1-1zM4 13H3a1 1 0 1 1 0-2h1a1 1 0 1 1 0 2zm18 0h-1a1 1 0 1 1 0-2h1a1 1 0 1 1 0 2zM5.99 6.99a1 1 0 0 1-1.41 0l-.71-.7A1 1 0 0 1 5.28 4.87l.71.71a1 1 0 0 1 0 1.41zm13.43 13.43a1 1 0 0 1-1.41 0l-.71-.71a1 1 0 0 1 1.42-1.41l.7.71a1 1 0 0 1 0 1.41zM18.01 6.99a1 1 0 0 1 0-1.41l.71-.71a1 1 0 1 1 1.41 1.42l-.71.7a1 1 0 0 1-1.41 0zM4.58 20.42a1 1 0 0 1 0-1.41l.71-.71a1 1 0 0 1 1.41 1.42l-.71.7a1 1 0 0 1-1.41 0z"/></svg>
        <span class="theme-toggle__txt">Light</span>
      </span>
    </button>
  </div>
</div>
